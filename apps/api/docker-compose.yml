services:
  db:
    image: postgres:16-alpine
    container_name: pg_dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # 格式为 [宿主机端口]:[容器内端口]
      # 内部 5432 不变，外部映射通过变量控制
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: